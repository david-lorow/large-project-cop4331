name: team24
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  file_picker: ^8.0.0
  http: ^1.1.0
  http_parser: ^4.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1  # ✅ moved here, no duplicate

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/reaper.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/reaper.png
    - assets/icon/reaper.png       # ✅ add icon path here too