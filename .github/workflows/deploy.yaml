name: Deploy

on:
  push:
    branches:
      - '**'

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    outputs:
      status: ${{ steps.set_status.outputs.status }}

    steps:
      - name: Deploy via SSH
        id: ssh_deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/large-project-cop4331


            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            > server/.env
            printf 'PORT=${{ secrets.PORT }}\n' >> server/.env
            printf 'MONGO_URI=${{ secrets.MONGO_URI }}\n' >> server/.env
            printf 'JWT_SECRET=${{ secrets.JWT_SECRET }}\n' >> server/.env
            printf 'JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}\n' >> server/.env
            printf 'EMAIL_ENABLED=${{ secrets.EMAIL_ENABLED }}\n' >> server/.env
            printf 'EMAIL_FROM=${{ secrets.EMAIL_FROM }}\n' >> server/.env
            printf 'APP_URL=${{ secrets.APP_URL }}\n' >> server/.env
            printf 'GRID_KEY=${{ secrets.GRID_KEY }}\n' >> server/.env
            printf 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}\n' >> server/.env
              
            cd server
            npm install

            cd ../frontend
            npm install
            npm run build

            cd ..
            pm2 delete large-project-cop4331 || true
            pm2 start server/server.js --name large-project-cop4331
            pm2 save

      - name: Set deploy status
        id: set_status
        if: always()
        run: |
          if [ "${{ steps.ssh_deploy.outcome }}" = "success" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Send Discord Notification
        env:
          DISCORD_HOOK: ${{ secrets.DISCORD_HOOK }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMITTER_NAME: ${{ github.event.head_commit.author.name }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          DEPLOY_STATUS: ${{ needs.deploy.outputs.status }}
        run: |
          if [ "$BRANCH" = "main" ]; then
            if [ "$DEPLOY_STATUS" = "success" ]; then
              DEPLOY_FIELD='{ "name": "🚀 Deployment", "value": "✅ Success", "inline": true }'
              COLOR=5763719
            else
              DEPLOY_FIELD='{ "name": "🚀 Deployment", "value": "❌ Failed", "inline": true }'
              COLOR=15548997
            fi
          else
            DEPLOY_FIELD='{ "name": "🚀 Deployment", "value": "⏭️ Skipped (not main)", "inline": true }'
            COLOR=16776960
          fi

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "New Push to $REPO",
              "url": "$COMMIT_URL",
              "color": $COLOR,
              "fields": [
                { "name": "👤 Contributor", "value": "$COMMITTER_NAME", "inline": true },
                { "name": "🌿 Branch", "value": "$BRANCH", "inline": true },
                $DEPLOY_FIELD,
                { "name": "💬 Commit Message", "value": "$COMMIT_MESSAGE", "inline": false }
              ],
              "footer": { "text": "GitHub Actions" },
              "timestamp": "$TIMESTAMP"
            }]
          }
          EOF
          )

          echo "Sending payload..."
          RESPONSE=$(curl -s -o /tmp/discord_response.txt -w "%{http_code}" -X POST "$DISCORD_HOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/discord_response.txt