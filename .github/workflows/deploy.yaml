name: Deploy

on:
  push:
    branches:
      - '**'

jobs:
  notify:
    name: Discord Notification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Discord Notification
        env:
          DISCORD_HOOK: ${{ secrets.DISCORD_HOOK }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMITTER_NAME: ${{ github.event.head_commit.author.name }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "New Push to $REPO",
              "url": "$COMMIT_URL",
              "color": 5763719,
              "fields": [
                { "name": "👤 Contributor", "value": "$COMMITTER_NAME", "inline": true },
                { "name": "🌿 Branch", "value": "$BRANCH", "inline": true },
                { "name": "💬 Commit Message", "value": "$COMMIT_MESSAGE", "inline": false }
              ],
              "footer": { "text": "GitHub Actions" },
              "timestamp": "$TIMESTAMP"
            }]
          }
          EOF
          )

          echo "Sending payload..."
          RESPONSE=$(curl -s -o /tmp/discord_response.txt -w "%{http_code}" -X POST "$DISCORD_HOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/discord_response.txt