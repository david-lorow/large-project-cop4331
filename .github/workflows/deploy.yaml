name: Deploy

on:
  push:
    branches:
      - '**'

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    outputs:
      status: ${{ steps.set_status.outputs.status }}

    steps:
      - name: Deploy via SSH
        id: ssh_deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/large-project-cop4331
            git pull origin main

            cd server
            npm install

            cd ../client
            npm install
            npm run build

            cd ..
            pm2 describe large-project-cop4331 > /dev/null \
              && pm2 restart large-project-cop4331 \
              || pm2 start server/server.js --name large-project-cop4331

            pm2 save

      - name: Set deploy status
        id: set_status
        run: |
          if [ "${{ steps.ssh_deploy.outcome }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi